name: Daily India Job Alert

on:
  schedule:
    # 3:30 AM UTC = 9:00 AM IST every day
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch & filter, no email)"
        required: false
        default: "false"
        type: boolean
      send_test:
        description: "Send test email (ignores deduplication)"
        required: false
        default: "false"
        type: boolean

jobs:
  job-alert:
    name: Fetch & Send Job Digest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -c "from cryptography.hazmat.primitives import serialization; from src.scrapers.naukri import _generate_nkparam; _generate_nkparam(); print('Naukri nkparam OK')"

      # Deduplication history: one cache per branch (same key on restore + save)
      - name: Cache seen-jobs history
        id: seen-jobs-cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.ref_name }}
          restore-keys: |
            seen-jobs-${{ github.ref_name }}
            seen-jobs-

      - name: Initialize seen-jobs file
        run: |
          if [ ! -f seen_jobs.json ]; then
            echo '{"ids":[],"timestamps":{}}' > seen_jobs.json
            echo "No prior cache – started fresh dedup history"
          else
            echo "Restored seen-jobs cache (cache-hit=${{ steps.seen-jobs-cache.outputs.cache-hit }})"
          fi

      - name: Verify email secrets (required for send)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "=== Secret diagnostics (values masked by GitHub) ==="
          missing=0
          for name in EMAIL_SENDER EMAIL_PASSWORD EMAIL_RECIPIENT; do
            val="${!name}"
            if [ -z "$val" ]; then
              echo "::error::Secret $name is EMPTY or not set in Settings → Secrets → Actions"
              missing=1
            else
              echo "✅ $name is set (length: ${#val})"
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more required secrets are missing. Add them at:"
            echo "::error::https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          len="${#EMAIL_PASSWORD}"
          norm="${EMAIL_PASSWORD//[[:space:]-]/}"
          echo "EMAIL_PASSWORD raw_len=${len}  norm_len=${#norm}  (Gmail App Password must be 16 chars)"
          if [ "${#norm}" -eq 0 ]; then
            echo "::error::EMAIL_PASSWORD normalizes to empty – check the secret value"
            exit 1
          elif [ "${#norm}" != "16" ]; then
            echo "::warning::EMAIL_PASSWORD is ${#norm} chars after stripping spaces/dashes (expected 16)"
          else
            echo "✅ EMAIL_PASSWORD length looks correct (16 chars)"
          fi

          echo "Sender  : ${EMAIL_SENDER}"
          echo "Recipients env: ${EMAIL_RECIPIENT}"
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}

      - name: Test SMTP (send one email)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python main.py --test-email --verbose

      - name: Run job alert (normal)
        if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.send_test != 'true' }}
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
        run: python main.py --verbose

      - name: Run job alert (dry run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          DRY_RUN_SAVE_HTML: "1"
        run: python main.py --dry-run --verbose

      - name: Run job alert (send test)
        if: ${{ github.event.inputs.send_test == 'true' }}
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
        run: python main.py --send-test --verbose

      # Upload HTML preview as artifact (dry-run only)
      - name: Upload HTML preview
        if: ${{ github.event.inputs.dry_run == 'true' && hashFiles('job_digest_preview.html') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: job-digest-preview
          path: job_digest_preview.html
          retention-days: 7
