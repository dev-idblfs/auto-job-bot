# ============================================================
# auto-job-bot – India Job Alert System Configuration
# ============================================================
# Edit this file to customise your daily job search.
# All filter dimensions are derived from resume.json by default;
# use the overrides below to fine-tune without editing the resume.

email:
  # Must match EMAIL_SENDER environment variable
  sender: "your.email@gmail.com"
  # Comma-separated in EMAIL_RECIPIENT env var, or list here
  recipients:
    - "your.email@gmail.com"
  subject_prefix: "[Job Alert]"
  # Max jobs to include in each daily digest email
  max_jobs_per_email: 30

search:
  # Only include jobs posted in the last N days (1 = today only)
  days_back: 1

  # Minimum relevance score (0–100) to include a job
  # Lower to get more results, raise to get tighter matches
  min_relevance_score: 40

  # Maximum raw results to fetch per source before filtering
  max_results_per_source: 50

  # ── Job Sources ─────────────────────────────────────────
  # Set to false to disable a source
  sources:
    linkedin_jobs: true       # LinkedIn public guest API (no auth needed)
    linkedin_posts: false     # LinkedIn posts with job links (needs LINKEDIN_EMAIL + LINKEDIN_PASSWORD)
    naukri: true              # Naukri.com – India's largest job board
    indeed: true              # Indeed India (in.indeed.com)
    foundit: true             # Foundit.in (formerly Monster India)
    hirist: true              # Hirist.tech – dedicated India tech jobs
    cutshort: true            # Cutshort.io – startup & tech jobs India
    internshala: false        # Internshala – enable for junior/fresher roles (0–3 yrs exp)
    company_careers: true     # Scrape career pages of top Indian tech companies

filters:
  # ── Location ────────────────────────────────────────────
  # Override resume.json location here (optional).
  # Leave empty to use city/state/preferred_locations from resume.json.
  # Example: ["Bengaluru", "Mumbai", "Hyderabad", "Remote"]
  locations: []
  remote_only: false         # true = only show remote/WFH jobs

  # ── Job Titles ───────────────────────────────────────────
  # Override desired job titles from resume.json (optional).
  # Leave empty to auto-build from resume.json → target.job_titles
  job_titles: []

  # ── Job Type Filter ──────────────────────────────────────
  # When true, only jobs matching the preferred job_types in resume.json
  # (full-time, contract, part-time, internship, remote) will be included.
  # The filter checks both the structured job_type field AND free-text
  # signals in the description so that scrapers with limited type data
  # are not over-penalised. Set to false to include all job types.
  filter_by_job_type: false

  # ── Keyword Filters ──────────────────────────────────────
  # Every job MUST contain at least one of these keywords (optional)
  required_keywords: []      # e.g. ["Python"] to only show Python jobs

  # Jobs containing ANY of these are excluded
  excluded_keywords:
    - "10+ years"
    - "12+ years"
    - "15+ years"
    - "20+ years"
    - "Principal Engineer"
    - "VP of Engineering"
    - "Director of Engineering"
    - "unpaid"
    - "commission only"

  # ── Experience Level Mapping ─────────────────────────────
  # Keywords used to detect the seniority of a job posting.
  # Matched against the job's title + description for scoring.
  experience_levels:
    junior:
      keywords:
        - "0-1 year"
        - "0-2 years"
        - "1-2 years"
        - "fresher"
        - "entry level"
        - "entry-level"
        - "new grad"
        - "graduate"
        - "junior"
        - "associate"
    mid:
      keywords:
        - "2-4 years"
        - "2-5 years"
        - "3-5 years"
        - "3-6 years"
        - "mid level"
        - "mid-level"
        - "intermediate"
    senior:
      keywords:
        - "5+ years"
        - "5-8 years"
        - "6-9 years"
        - "senior"
        - "sr."
        - "lead"
        - "staff"
        - "principal"
        - "experienced"

scoring:
  # ── Relevance Scoring Weights ────────────────────────────
  # Each weight controls how much that dimension contributes to the
  # 0–100 relevance score.  Weights should sum to 100.
  #
  #  title_match_weight    – job title vs. resume.json → target.job_titles
  #  skills_match_weight   – resume skills in job description/tags
  #  projects_match_weight – project technologies & domain keywords in job text
  #  location_match_weight – city / preferred_locations / remote match
  #  experience_match_weight – experience-level language vs. profile level
  #
  # A small bonus (up to +5) is added when preferred_terms from
  # resume.json → target.preferred_terms appear in the job text.

  title_match_weight: 25
  skills_match_weight: 30
  projects_match_weight: 15
  location_match_weight: 15
  experience_match_weight: 15

deduplication:
  # Skip jobs already seen in previous runs
  enabled: true
  history_file: "seen_jobs.json"
  # Remove seen-job records older than this many days
  retention_days: 30
